[profile.default]
src = "src"
out = "out"
libs = ["lib", "dependencies"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
bytecode_hash = "none"
cbor_metadata = false
fs_permissions = [{ access = "read", path = "./"}]

[profile.ci]
fuzz = { runs = 1000 }
invariant = { runs = 256, depth = 500 }

[rpc_endpoints]
base = "${BASE_RPC_URL}"
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"

[etherscan]
base = { key = "${BASESCAN_API_KEY}", chain = 8453 }
base_sepolia = { key = "${BASESCAN_API_KEY}", chain = 84532 }

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
int_types = "long"

[dependencies]
