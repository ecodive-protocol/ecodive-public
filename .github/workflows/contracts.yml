name: contracts

on:
  push:
    branches: [main]
    paths:
      - "contracts/**"
      - ".github/workflows/contracts.yml"
  pull_request:
    paths:
      - "contracts/**"
      - ".github/workflows/contracts.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Configure git for forge
        run: |
          git config --global user.email "ci@ecodive.xyz"
          git config --global user.name "EcoDive CI"

      - name: Install dependencies
        run: |
          rm -f .gitmodules
          forge install OpenZeppelin/openzeppelin-contracts@v5.1.0 foundry-rs/forge-std

      - name: Check formatting
        run: forge fmt --check

      - name: Build
        run: forge build --sizes

      - name: Run tests
        run: forge test -vvv
        env:
          FOUNDRY_PROFILE: ci

      - name: Coverage
        run: forge coverage --report summary
